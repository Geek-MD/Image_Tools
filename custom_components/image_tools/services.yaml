resize_image:
  name: Resize Image
  description: >
    Resize an image to specific dimensions. Optionally adjust the aspect ratio
    before resizing using crop, letterbox, or stretch mode.
  fields:
    input_path:
      name: Input Path
      description: Full path to the source image file.
      required: true
      example: "/media/photos/photo.jpg"
      selector:
        text:
    output_path:
      name: Output Path
      description: >
        Full path for the output image file. If omitted and overwrite is false,
        a path is auto-generated by appending "_resized" before the extension.
      required: false
      example: "/media/photos/photo_resized.jpg"
      selector:
        text:
    overwrite:
      name: Overwrite Original
      description: When true, the original file is overwritten. output_path is ignored.
      default: false
      selector:
        boolean:
    width:
      name: Width
      description: Target width in pixels. Optional when height is provided.
      required: false
      example: 1920
      selector:
        number:
          min: 1
          max: 65535
          mode: box
          unit_of_measurement: px
    height:
      name: Height
      description: Target height in pixels. Optional when width is provided.
      required: false
      example: 1080
      selector:
        number:
          min: 1
          max: 65535
          mode: box
          unit_of_measurement: px
    keep_aspect_ratio:
      name: Keep Aspect Ratio
      description: Preserve the original aspect ratio when resizing.
      default: true
      selector:
        boolean:
    target_aspect_ratio:
      name: Target Aspect Ratio
      description: >
        Desired aspect ratio as a decimal (width / height). For example 1.777
        for 16:9 or 1.333 for 4:3. Applied before resizing.
      required: false
      example: 1.777
      selector:
        number:
          min: 0.1
          max: 10.0
          step: 0.001
          mode: box
    aspect_mode:
      name: Aspect Mode
      description: >
        How to apply target_aspect_ratio: crop (centre-crop), letterbox (add
        black bars), or stretch (distort).
      default: "crop"
      selector:
        select:
          options:
            - "crop"
            - "letterbox"
            - "stretch"

convert_image:
  name: Convert Image
  description: Convert an image to a different file format.
  fields:
    input_path:
      name: Input Path
      description: Full path to the source image file.
      required: true
      example: "/media/photos/photo.png"
      selector:
        text:
    output_path:
      name: Output Path
      description: >
        Full path for the output image file. If omitted and overwrite is false,
        a path is auto-generated by changing the extension.
      required: false
      example: "/media/photos/photo.jpg"
      selector:
        text:
    overwrite:
      name: Overwrite Original
      description: When true, the original file is overwritten. output_path is ignored.
      default: false
      selector:
        boolean:
    output_format:
      name: Output Format
      description: Target image format.
      required: true
      example: "jpg"
      selector:
        select:
          options:
            - "png"
            - "jpg"
            - "jpeg"
            - "webp"
            - "gif"
            - "bmp"
            - "tiff"
            - "tif"
